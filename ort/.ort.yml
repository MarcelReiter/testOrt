analyzer:
  # Enabling skip_excludes offers massive performance benefits:
  # Instead of "disabling" excluded dependencies they are now actually ignored totally
  skip_excluded: true
excludes:
  # docs on excluding scopes: https://oss-review-toolkit.org/ort/docs/configuration/ort-yml#excluding-scopes
  scopes:
    # Refactor once this drops: https://github.com/oss-review-toolkit/ort/issues/11236
    # Until then, we use this regex: https://github.com/oss-review-toolkit/ort/issues/2276#issuecomment-592497091
    - pattern: "^(?!.*\\breleaseCompileClasspath\\b).*$"
      reason: BUILD_DEPENDENCY_OF
      comment: "Drop everything (autogenerated stuff) except for releaseCompileClasspath"
# docs on curations: https://oss-review-toolkit.org/ort/docs/configuration/ort-yml#curations
curations:
  packages:
    - id: "Maven:androidx.databinding:viewbinding"
      curations:
        comment: "ViewBinding doesn't supply a proper URl"
        homepage_url: "https://developer.android.com/topic/libraries/view-binding"
    - id: "Maven:org.jetbrains.kotlin:kotlin-stdlib-common"
      curations:
        comment: "Original URl produces a 404"
        source_artifact:
          url: "https://repo1.maven.org/maven2/org/jetbrains/kotlin/kotlin-stdlib/2.2.0/kotlin-stdlib-2.2.0.jar"
          hash:
            value: "c9047f6538c05d429308cdb8eda366e7"
            algorithm: "MD5"
