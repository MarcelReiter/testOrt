analyzer:
  # Enabling skip_excludes offers massive performance benefits:
  # Instead of "disabling" excluded dependencies they are now actually ignored totally
  skip_excluded: true
excludes:
  # docs on excluding scopes: https://oss-review-toolkit.org/ort/docs/configuration/ort-yml#excluding-scopes
  scopes:
    # Refactor once this drops: https://github.com/oss-review-toolkit/ort/issues/11236
    # Until then, we use this regex: https://github.com/oss-review-toolkit/ort/issues/2276#issuecomment-592497091
    - pattern: "^(?!.*\\breleaseRuntimeClasspath\\b).*$"
      reason: BUILD_DEPENDENCY_OF
      comment: "Drop everything (autogenerated stuff) except for releaseRuntimeClasspath"
  # docs on excluding paths: https://oss-review-toolkit.org/ort/docs/configuration/ort-yml#excluding-paths
  paths:
    - pattern: "ort/cache/**"
      reason: OTHER
      comment: "Don't scan our cache again"

# docs on curations: https://oss-review-toolkit.org/ort/docs/configuration/ort-yml#curations
curations:
  packages:
    # ORT doesn't like empty dependencies
    - id: "Maven:com.google.guava:listenablefuture:9999.0-empty-to-avoid-conflict-with-guava"
      curations:
        authors:
          - "Google"
        concluded_license: "Apache-2.0"
        comment: "This is empty"
